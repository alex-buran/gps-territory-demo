<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>GPS Territory Demo</title>
<meta name="description" content="A browser prototype of GPS-based territory capture: walk a route, claim the tiles you cross.">

<meta property="og:type" content="website">
<meta property="og:url" content="https://alex-buran.github.io/gps-territory-demo/">
<meta property="og:title" content="GPS Territory Demo — territory capture prototype">
<meta property="og:description" content="Walk a route, claim the map tiles you cross. Single-file Leaflet prototype with a demo mode that needs no permissions.">
<meta property="og:image" content="https://alex-buran.github.io/gps-territory-demo/preview.jpg">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta property="og:image:alt" content="A closed running loop drawn over a dark map of Istanbul, with the grid tiles along the route filled in teal.">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="GPS Territory Demo — territory capture prototype">
<meta name="twitter:description" content="Walk a route, claim the map tiles you cross. Single-file Leaflet prototype with a demo mode that needs no permissions.">
<meta name="twitter:image" content="https://alex-buran.github.io/gps-territory-demo/preview.jpg">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<style>
  :root{
    --bg:#070D16; --surface:rgba(13,21,34,.82); --line:rgba(255,255,255,.09);
    --teal:#20E3B2; --blue:#2F7DFF; --text:#EAF2F8; --dim:#8697AC;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%;overflow:hidden;background:var(--bg);
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,sans-serif;
    color:var(--text);-webkit-font-smoothing:antialiased}
  #map{position:fixed;inset:0;background:var(--bg)}
  .leaflet-container{background:var(--bg)}
  .leaflet-control-attribution{background:rgba(0,0,0,.4)!important;color:#5b6b80!important;font-size:9px!important}
  .leaflet-control-attribution a{color:#6f8299!important}

  .top{position:fixed;top:0;left:0;right:0;z-index:500;padding:calc(env(safe-area-inset-top) + 14px) 16px 26px;
    background:linear-gradient(to bottom,rgba(7,13,22,.92),rgba(7,13,22,0));pointer-events:none}
  .brand{display:flex;align-items:center;gap:9px}
  .dot{width:9px;height:9px;border-radius:50%;background:var(--teal);box-shadow:0 0 12px var(--teal)}
  .brand b{font-size:15px;font-weight:600;letter-spacing:-.2px}
  .brand span{font-size:11px;color:var(--dim);margin-left:auto;letter-spacing:.4px;
    border:1px solid var(--line);padding:3px 8px;border-radius:20px;background:rgba(255,255,255,.03)}

  .hud{position:fixed;left:12px;right:12px;bottom:calc(env(safe-area-inset-bottom) + 12px);z-index:500}
  .card{background:var(--surface);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
    border:1px solid var(--line);border-radius:22px;padding:16px}
  .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;margin-bottom:14px}
  .stat{text-align:center;position:relative}
  .stat+.stat:before{content:"";position:absolute;left:0;top:14%;height:72%;width:1px;background:var(--line)}
  .stat .v{font-size:26px;font-weight:650;letter-spacing:-1px;font-variant-numeric:tabular-nums;line-height:1.1}
  .stat .l{font-size:10px;color:var(--dim);letter-spacing:.9px;text-transform:uppercase;margin-top:5px}
  .stat.tealv .v{color:var(--teal)}

  .btn{display:block;width:100%;border:0;border-radius:15px;padding:16px;font-size:16px;font-weight:600;
    font-family:inherit;letter-spacing:-.2px;cursor:pointer;transition:transform .15s,opacity .15s}
  .btn:active{transform:scale(.975)}
  .btn.go{background:linear-gradient(135deg,var(--teal),#12B98F);color:#04231B;box-shadow:0 6px 22px rgba(32,227,178,.28)}
  .btn.stop{background:rgba(255,80,90,.14);color:#FF6B72;border:1px solid rgba(255,80,90,.3)}
  .btn.ghost{background:transparent;color:var(--dim);border:1px solid var(--line);padding:12px;font-size:13px;margin-top:8px}

  .sheet{position:fixed;inset:0;z-index:900;background:rgba(4,8,14,.7);backdrop-filter:blur(8px);
    display:flex;align-items:flex-end;opacity:0;pointer-events:none;transition:opacity .3s}
  .sheet.on{opacity:1;pointer-events:auto}
  .sheet .inner{width:100%;background:#0C1522;border-radius:26px 26px 0 0;padding:22px 18px calc(env(safe-area-inset-bottom) + 18px);
    border-top:1px solid var(--line);transform:translateY(30px);transition:transform .35s cubic-bezier(.22,1,.36,1)}
  .sheet.on .inner{transform:none}
  .grab{width:38px;height:4px;border-radius:4px;background:rgba(255,255,255,.18);margin:0 auto 16px}
  .sheet h2{margin:0 0 3px;font-size:21px;font-weight:650;letter-spacing:-.4px}
  .sheet p.sub{margin:0 0 18px;font-size:13px;color:var(--dim)}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:16px}
  .box{background:rgba(255,255,255,.045);border:1px solid var(--line);border-radius:14px;padding:13px}
  .box .v{font-size:20px;font-weight:650;letter-spacing:-.5px;font-variant-numeric:tabular-nums}
  .box .l{font-size:10px;color:var(--dim);letter-spacing:.8px;text-transform:uppercase;margin-top:4px}
  .box.hl{background:linear-gradient(135deg,rgba(32,227,178,.16),rgba(32,227,178,.05));border-color:rgba(32,227,178,.32)}
  .box.hl .v{color:var(--teal)}

  .toast{position:fixed;top:calc(env(safe-area-inset-top) + 62px);left:50%;transform:translateX(-50%) translateY(-14px);
    z-index:800;background:rgba(32,227,178,.14);border:1px solid rgba(32,227,178,.4);color:var(--teal);
    padding:9px 16px;border-radius:30px;font-size:13px;font-weight:600;white-space:nowrap;
    opacity:0;transition:all .3s;backdrop-filter:blur(14px)}
  .toast.on{opacity:1;transform:translateX(-50%) translateY(0)}

  .pulse{width:18px;height:18px;border-radius:50%;background:var(--blue);border:2.5px solid #fff;
    box-shadow:0 0 0 rgba(47,125,255,.6);animation:pl 2s infinite}
  @keyframes pl{0%{box-shadow:0 0 0 0 rgba(47,125,255,.55)}70%{box-shadow:0 0 0 18px rgba(47,125,255,0)}100%{box-shadow:0 0 0 0 rgba(47,125,255,0)}}
</style>
</head>
<body>
<div id="map"></div>

<div class="top">
  <div class="brand">
    <div class="dot"></div><b>GPS Territory Demo</b>
    <span id="mode">READY</span>
  </div>
</div>

<div class="toast" id="toast">Zone captured</div>

<div class="hud">
  <div class="card">
    <div class="stats">
      <div class="stat"><div class="v" id="sTime">00:00</div><div class="l">Time</div></div>
      <div class="stat"><div class="v" id="sDist">0.00</div><div class="l">Kilometres</div></div>
      <div class="stat tealv"><div class="v" id="sZone">0</div><div class="l">Zones</div></div>
    </div>
    <button class="btn go" id="btn">Start demo mode</button>
    <button class="btn ghost" id="btnGps">Start with live GPS</button>
  </div>
</div>

<div class="sheet" id="sheet">
  <div class="inner">
    <div class="grab"></div>
    <h2>Activity complete</h2>
    <p class="sub">Every zone along your route is now under your control.</p>
    <div class="grid2">
      <div class="box"><div class="v" id="fDist">0.00 km</div><div class="l">Distance</div></div>
      <div class="box"><div class="v" id="fTime">00:00</div><div class="l">Time</div></div>
      <div class="box"><div class="v" id="fPace">0'00"</div><div class="l">Pace /km</div></div>
      <div class="box hl"><div class="v" id="fZone">0</div><div class="l">Zones captured</div></div>
    </div>
    <button class="btn go" id="btnAgain">Close</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
const CENTER=[41.0448,28.9938];
const CELL=0.00042;
const map=L.map('map',{zoomControl:false,attributionControl:true}).setView(CENTER,16);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png',
  {maxZoom:20,attribution:'&copy; OpenStreetMap, &copy; CARTO'}).addTo(map);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_only_labels/{z}/{x}/{y}{r}.png',
  {maxZoom:20,opacity:.65}).addTo(map);

const gridLayer=L.layerGroup().addTo(map);
const cellLayer=L.layerGroup().addTo(map);
const el=id=>document.getElementById(id);

let running=false,simId=null,watchId=null,path=[],dist=0,t0=0,simSec=0;
const owned=new Set();
let line=null,me=null;

function drawGrid(){
  gridLayer.clearLayers();
  if(map.getZoom()<15)return;
  const b=map.getBounds(),s=Math.floor(b.getSouth()/CELL),n=Math.ceil(b.getNorth()/CELL);
  const w=Math.floor(b.getWest()/CELL),e=Math.ceil(b.getEast()/CELL);
  if((n-s)*(e-w)>2200)return;
  const st={color:'#ffffff',weight:.5,opacity:.07,interactive:false};
  for(let r=s;r<=n;r++)L.polyline([[r*CELL,b.getWest()],[r*CELL,b.getEast()]],st).addTo(gridLayer);
  for(let c=w;c<=e;c++)L.polyline([[b.getSouth(),c*CELL],[b.getNorth(),c*CELL]],st).addTo(gridLayer);
}
map.on('moveend zoomend',drawGrid);drawGrid();

function capture(lat,lng){
  const r=Math.floor(lat/CELL),c=Math.floor(lng/CELL),k=r+'_'+c;
  if(owned.has(k))return false;
  owned.add(k);
  const rect=L.rectangle([[r*CELL,c*CELL],[(r+1)*CELL,(c+1)*CELL]],
    {color:'#20E3B2',weight:1,opacity:.55,fillColor:'#20E3B2',fillOpacity:0,interactive:false}).addTo(cellLayer);
  let o=0;const fade=setInterval(()=>{o+=.035;rect.setStyle({fillOpacity:Math.min(o,.3)});
    if(o>=.3)clearInterval(fade)},16);
  el('sZone').textContent=owned.size;
  return true;
}
let tt=null;
function toast(){el('toast').classList.add('on');clearTimeout(tt);
  tt=setTimeout(()=>el('toast').classList.remove('on'),1400)}

function hav(a,b){const R=6371e3,p=Math.PI/180;
  const dl=(b[0]-a[0])*p,dg=(b[1]-a[1])*p;
  const x=Math.sin(dl/2)**2+Math.cos(a[0]*p)*Math.cos(b[0]*p)*Math.sin(dg/2)**2;
  return 2*R*Math.asin(Math.sqrt(x))}

function fmt(s){s=Math.floor(s);return String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0')}

function push(lat,lng){
  const pt=[lat,lng];
  if(path.length)dist+=hav(path[path.length-1],pt);
  path.push(pt);
  if(!line)line=L.polyline(path,{color:'#2F7DFF',weight:5,opacity:.95,lineCap:'round',lineJoin:'round'}).addTo(map);
  else line.setLatLngs(path);
  if(!me)me=L.marker(pt,{icon:L.divIcon({className:'',html:'<div class="pulse"></div>',iconSize:[18,18],iconAnchor:[9,9]})}).addTo(map);
  else me.setLatLng(pt);
  if(capture(lat,lng))toast();
  el('sDist').textContent=(dist/1000).toFixed(2);
}

const route=[];
for(let i=0;i<=260;i++){
  const a=i/260*Math.PI*2;
  const r=.0034+.0011*Math.sin(3*a)+.0006*Math.cos(5*a);
  route.push([CENTER[0]+r*Math.sin(a),CENTER[1]+r*Math.cos(a)/Math.cos(CENTER[0]*Math.PI/180)]);
}

function reset(){
  running=false;path=[];dist=0;simSec=0;owned.clear();
  cellLayer.clearLayers();if(line){map.removeLayer(line);line=null}
  if(me){map.removeLayer(me);me=null}
  el('sTime').textContent='00:00';el('sDist').textContent='0.00';el('sZone').textContent='0';
}

function finish(){
  running=false;clearInterval(simId);simId=null;
  if(watchId!==null){navigator.geolocation.clearWatch(watchId);watchId=null}
  el('btn').textContent='Start demo mode';el('btn').className='btn go';
  el('btnGps').style.display='';el('mode').textContent='READY';
  const secs=simSec||((Date.now()-t0)/1000);
  el('fDist').textContent=(dist/1000).toFixed(2)+' km';
  el('fTime').textContent=fmt(secs);
  const km=dist/1000;
  el('fPace').textContent=km>.02?Math.floor(secs/km/60)+"'"+String(Math.round(secs/km%60)).padStart(2,'0')+'"':"--";
  el('fZone').textContent=owned.size;
  el('sheet').classList.add('on');
  if(path.length>1)map.fitBounds(L.latLngBounds(path).pad(.25),{animate:true});
}

let idx=0;
function startSim(){
  reset();running=true;idx=0;
  el('btn').textContent='Finish activity';el('btn').className='btn stop';
  el('btnGps').style.display='none';el('mode').textContent='DEMO MODE';
  map.setView(CENTER,17,{animate:true});
  simId=setInterval(()=>{
    if(idx>=route.length){finish();return}
    const p=route[idx++];push(p[0],p[1]);
    simSec+=3.6;
    el('sTime').textContent=fmt(simSec);
    if(idx%4===0)map.panTo(p,{animate:true,duration:.4});
  },90);
}

function startGps(){
  if(!navigator.geolocation){alert('This device does not support geolocation.');return}
  reset();running=true;t0=Date.now();
  el('btn').textContent='Finish activity';el('btn').className='btn stop';
  el('btnGps').style.display='none';el('mode').textContent='LIVE GPS';
  const tick=setInterval(()=>{if(!running){clearInterval(tick);return}
    el('sTime').textContent=fmt((Date.now()-t0)/1000)},500);
  watchId=navigator.geolocation.watchPosition(
    p=>{if(!running)return;
      if(p.coords.accuracy>60)return;
      push(p.coords.latitude,p.coords.longitude);
      map.setView([p.coords.latitude,p.coords.longitude],17)},
    ()=>{alert('Location permission denied. Try demo mode instead.');finish()},
    {enableHighAccuracy:true,maximumAge:1000,timeout:12000});
}

el('btn').onclick=()=>running?finish():startSim();
el('btnGps').onclick=()=>{if(!running)startGps()};
el('btnAgain').onclick=()=>{el('sheet').classList.remove('on');reset();map.setView(CENTER,16,{animate:true})};
</script>
</body>
</html>
